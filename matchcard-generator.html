  <div class="matchcard-layout">
    <aside class="matchcard-sidebar">
      <div class="pool-title-banner">
        <h2 class="pool-title-text">Available Roster</h2>
        <span id="matchcard-roster-count" class="pool-count">0</span>
      </div>
      <div class="filters-container">
        <input type="text" id="matchcard-search" class="matchcard-search" placeholder="Search name..." aria-label="Search roster by name">
        <div class="filter-row">
          <select id="matchcard-filter-sex" aria-label="Filter by gender">
            <option value="all">All Genders</option>
            <option value="man">Men</option>
            <option value="woman">Women</option>
          </select>
          <select id="matchcard-filter-tier" aria-label="Filter by tier">
            <option value="all">All Tiers</option>
            <option value="high">Main Event</option>
            <option value="mid">Mid Card</option>
            <option value="low">Jobber</option>
          </select>
        </div>
      </div>
      <div id="matchcard-roster-list" class="matchcard-roster-list cards-grid"></div>
    </aside>

    <!-- Mobile roster picker overlay (used when tapping an empty VS slot) -->
    <div id="matchcard-roster-overlay" class="matchcard-roster-overlay" hidden aria-hidden="true">
      <div class="matchcard-roster-overlay-inner">
        <div class="matchcard-roster-overlay-header">
          <h2 class="matchcard-roster-overlay-title">Tap a superstar to fill the slot</h2>
          <button type="button" id="matchcard-roster-overlay-close" class="matchcard-roster-overlay-close" aria-label="Close roster picker">×</button>
        </div>
        <div class="matchcard-roster-overlay-body">
          <!-- The existing #matchcard-roster-list is moved here on mobile while picking -->
        </div>
      </div>
    </div>

    <div class="matchcard-main">
      <div class="match-settings-bar">
        <label class="match-setting">
          <span class="match-setting-label">Show Theme</span>
          <select id="matchcard-ppv" class="match-setting-select">
            <option value="default">Default</option>
            <option value="raw">Raw</option>
            <option value="smackdown">SmackDown</option>
            <option value="nxt">NXT</option>
            <option value="dynamite">Dynamite</option>
            <option value="collision">Collision</option>
            <option value="rampage">Rampage</option>
            <option value="oldnxt">Old NXT</option>
            <option value="mainevent">Main Event</option>
            <option value="snme">Saturday Night's Main Event</option>
            <option value="wm41">Wrestlemania</option>
            <option value="royalrumble">Royal Rumble</option>
            <option value="summerslam">Summerslam</option>

            <option value="mitb">Money In The Bank</option>
            <option value="ec">Elimination Chamber</option>
            <option value="backlash">Backlash</option>
            <option value="hiac">Hell In A Cell</option>
            <option value="bb">Bad Blood</option>
            <option value="catc">Clash At The Castle</option>
            <option value="cj">Crown Jewel</option>
            <option value="bib">Bash In Berlin</option>
          </select>
        </label>

      </div>

      <div class="matchcard-events-wrap">
        <div id="matchcard-events" class="matchcard-events"></div>
        <div class="matchcard-events-footer">
          <button type="button" id="matchcard-add-match-bottom" class="btn btn-add-match" aria-label="Add new match to card">+ Add Match</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="matchcard-footer" role="contentinfo">
    <button type="button" id="matchcard-download" class="btn-download" aria-label="Download match card image">Download Match Card</button>
  </footer>

  <div id="matchcard-preview-modal" class="matchcard-modal" role="dialog" aria-modal="true" hidden>
    <div class="matchcard-modal-backdrop" id="matchcard-modal-backdrop"></div>
    <div class="matchcard-modal-box">
      <h3 class="matchcard-modal-title">Match Card Preview</h3>
      <div class="matchcard-preview-scroll-wrap" aria-label="Match card preview - scroll horizontally if needed">
