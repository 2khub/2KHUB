<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - 2KHUB</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="home.css">
  <link rel="icon" type="image/png" href="icon.png">
  <style>
    .page-container {
      max-width: 600px;
      margin: 60px auto;
      padding: 30px;
      background: var(--wwe-panel, rgba(12, 12, 12, 0.96));
      border: 1px solid var(--wwe-border, rgba(255,255,255,0.08));
      border-radius: 8px;
      color: #ddd;
      text-align: center;
    }
    .page-title {
      color: #fff;
      margin-bottom: 20px;
      font-size: 2rem;
    }
    p { line-height: 1.6; margin-bottom: 20px; font-size: 1.1rem; }
    .contact-email {
      font-size: 1.2rem;
      color: #f1c40f;
      font-weight: bold;
      margin-bottom: 30px;
      display: block;
    }
    .social-links {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 30px;
    }

    /* Animation Staggering */
    .page-title, .page-container > p, .contact-email, .social-links, .back-link {
      opacity: 0;
      animation: fadeInUp 0.6s ease-out forwards;
    }

    .page-title { animation-delay: 0.1s; }
    .page-container > p:nth-of-type(1) { animation-delay: 0.2s; }
    .page-container > p:nth-of-type(2) { animation-delay: 0.3s; }
    .contact-email { animation-delay: 0.4s; }
    .page-container > p:nth-of-type(3) { animation-delay: 0.5s; }
    .social-links { animation-delay: 0.6s; }
    .back-link { animation-delay: 0.7s; }
  </style>
</head>
<body class="home-page" style="display: block;">
  <video autoplay muted loop id="bg-video" class="home-bg-video" aria-hidden="true" style="position: fixed;">
    <source src="video.mp4" type="video/mp4">
  </video>
  <div class="overlay" aria-hidden="true" style="position: fixed;"></div>

  <div class="page-container">
    <h1 class="page-title">Contact Us</h1>
    <p>Have a suggestion, found a bug, or just want to say hello?</p>
    <p>You can reach the 2KHUB team at:</p>
    
    <a href="mailto:contact@2khub.info" class="contact-email">contact@2khub.info</a>

    <p>Or connect with us on social media:</p>
    <div class="social-links">
        <a href="https://www.reddit.com/user/2khub/" target="_blank" class="hub-footer-link">Reddit</a>
        <a href="https://www.instagram.com/2khub.draft/" target="_blank" class="hub-footer-link">Instagram</a>
        <a href="https://www.tiktok.com/@2khub" target="_blank" class="hub-footer-link">TikTok</a>
    </div>

    <a href="index.html" class="back-link hub-footer-link" style="margin-top: 30px; width: fit-content;">&larr; Back to Home</a>
  </div>
</body>
</html>
